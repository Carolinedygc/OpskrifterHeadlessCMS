			<div>

			</div>

			<div>
				<select name="måltidstyper" id="måltidstyper" class="filterKnap">
					<option value="">Måltidstyper</option>
					<option value="29">Aftensmad</option>
					<option value="30">Frokost</option>
					<option value="31">Morgenmad</option>
					<option value="32">Dessert</option>
				</select>
			</div>

			<div>
				<select name="sæson" id="sæson" class="filterKnap">
					<option value="">Sæson</option>
					<option value="20">Forår</option>
					<option value="17">Sommer</option>
					<option value="18">Efterår</option>
					<option value="19">Vinter</option>
				</select>
			</div>

			<div>
				<select name="tilberedningstid" id="tilberedningstid" class="filterKnap">
					<option value="">Tilberedningstid</option>
					<option value="21">Hurtig</option>
					<option value="22">Medium</option>
					<option value="23">Langsom</option>
				</select>
			</div>

			<button type="button" class="nulstilKnap">Nulstil</button>

		</form>
